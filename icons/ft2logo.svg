<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27"/>
      <stop offset="100%" style="stop-color:#1a1e3a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00b4d8"/>
      <stop offset="100%" style="stop-color:#48cae4"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f0a500"/>
      <stop offset="100%" style="stop-color:#ffd700"/>
    </linearGradient>
    <linearGradient id="curve" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00b4d8"/>
      <stop offset="50%" style="stop-color:#48cae4"/>
      <stop offset="100%" style="stop-color:#90e0ef"/>
    </linearGradient>
  </defs>
  <rect width="400" height="120" rx="12" fill="url(#bg)"/>
  <rect x="0" y="0" width="400" height="4" rx="2" fill="url(#accent)"/>

  <!-- Shannon capacity curve (C = B*log2(1+S/N)) -->
  <path d="M 320,95 Q 335,85 345,65 Q 355,40 365,20" stroke="url(#curve)" stroke-width="2.5" fill="none" opacity="0.7"/>
  <circle cx="365" cy="20" r="3" fill="#48cae4" opacity="0.9"/>
  <circle cx="345" cy="65" r="2" fill="#48cae4" opacity="0.6"/>
  <!-- Decodium operating point near the curve -->
  <circle cx="350" cy="55" r="4" fill="#ffd700" opacity="0.9"/>
  <text x="358" y="58" font-family="Segoe UI,Arial,sans-serif" font-size="8" fill="#ffd700" opacity="0.8">0dB</text>

  <!-- Axis lines -->
  <line x1="318" y1="98" x2="375" y2="98" stroke="#555" stroke-width="0.5" opacity="0.5"/>
  <line x1="318" y1="98" x2="318" y2="15" stroke="#555" stroke-width="0.5" opacity="0.5"/>
  <text x="385" y="101" font-family="Segoe UI,Arial,sans-serif" font-size="7" fill="#666">S/N</text>
  <text x="310" y="14" font-family="Segoe UI,Arial,sans-serif" font-size="7" fill="#666">C</text>

  <!-- Title -->
  <text x="20" y="48" font-family="Segoe UI,Arial,sans-serif" font-size="34" font-weight="bold" fill="#ffffff" letter-spacing="2">DECODIUM</text>
  <text x="20" y="85" font-family="Segoe UI,Arial,sans-serif" font-size="30" font-weight="bold" fill="url(#accent)" letter-spacing="4">SHANNON</text>

  <!-- Formula badge -->
  <rect x="195" y="24" width="110" height="20" rx="4" fill="url(#accent)" opacity="0.15"/>
  <text x="250" y="39" font-family="Courier New,monospace" font-size="11" fill="#48cae4" text-anchor="middle" opacity="0.9">C=Blog2(1+S/N)</text>

  <line x1="20" y1="100" x2="310" y2="100" stroke="url(#gold)" stroke-width="1.5" opacity="0.5"/>
  <text x="310" y="115" font-family="Segoe UI,Arial,sans-serif" font-size="9" fill="#888" text-anchor="end">IU8LMC</text>
</svg>
